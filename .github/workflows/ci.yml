name: CI

# Run on every push to the default branch and on every PR targeting it.
# Both `main` and `master` are listed because the repo's local default is
# `master`; keeping both means CI fires regardless of which name the remote uses.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:        # allow manual runs from the Actions tab

# Cancel an in-progress run when a new commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Fast static checks ────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check .

  # ── Core test matrix (no neural extras) ───────────────────────────────
  #  The suite is written to pass WITHOUT the optional torch/DFN/WPE deps,
  #  so this installs only requirements.txt and exercises the 6-beamformer
  #  core across the Python versions we support.
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.13 is intentionally omitted: the deps pin numpy<2, which has no
        # Python 3.13 wheel (3.13 support landed in numpy 2.0). Re-add 3.13 once
        # the NumPy 2.0 migration is done (tracked in requirements-optional.txt).
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      # sounddevice loads libportaudio2 at runtime; harmless for the tests
      # (which never touch the live-record path) but installing it keeps any
      # accidental import from crashing collection.
      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libportaudio2 libsndfile1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # Fails fast with a clear message if the app factory or any blueprint
      # import is broken — cheaper signal than waiting for the full suite.
      - name: App-boot smoke test
        run: python -c "from octovox_app import create_app; create_app(); print('create_app() OK')"

      # Coverage is reported (term-missing) but NOT gated on a threshold yet —
      # measure first, set a floor later once a baseline is established.
      - name: Run tests
        run: pytest --cov=octovox_app --cov-report=term-missing
