name: CI

# Run on every push to main and on every PR targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # allow manual runs from the Actions tab

# Cancel an in-progress run when a new commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Fast static checks ────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check .

  # ── Core test matrix (no neural extras) ───────────────────────────────
  #  The suite is written to pass WITHOUT the optional torch/DFN/WPE deps,
  #  so this installs only requirements.txt and exercises the 6-beamformer
  #  core across the Python versions we support.
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      # sounddevice loads libportaudio2 at runtime; harmless for the tests
      # (which never touch the live-record path) but installing it keeps any
      # accidental import from crashing collection.
      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libportaudio2 libsndfile1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # Fails fast with a clear message if the app factory or any blueprint
      # import is broken — cheaper signal than waiting for the full suite.
      - name: App-boot smoke test
        run: python -c "from octovox_app import create_app; create_app(); print('create_app() OK')"

      - name: Run tests
        run: pytest

  # ── Optional neural-extras suite ──────────────────────────────────────
  #  Heavy (CPU torch + DeepFilterNet2 + nara-wpe). Runs on main and on
  #  manual dispatch only — not on every PR — and is pinned to Python 3.11,
  #  the version the torch==2.1.2 wheels target. continue-on-error keeps a
  #  flaky optional-dep install from blocking a merge; the core matrix above
  #  is the gate.
  test-optional:
    name: Test (neural extras, py3.11)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt

      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libportaudio2 libsndfile1

      - name: Install dependencies (core + CPU torch extras)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Use the CPU-only torch index so we don't pull multi-GB CUDA wheels.
          pip install torch==2.1.2 torchaudio==2.1.2 --index-url https://download.pytorch.org/whl/cpu
          pip install deepfilternet==0.5.6 "soundfile>=0.12" "nara-wpe>=0.0.9"
          pip install pytest

      - name: Run full suite (extras active)
        run: pytest
