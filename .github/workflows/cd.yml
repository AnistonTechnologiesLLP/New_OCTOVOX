name: CD

# Build & publish the Docker image to the GitHub Container Registry (GHCR).
#   - push to main         -> tags :main and :sha-<short>   (rolling latest-dev)
#   - push a v* git tag    -> tags :vX.Y.Z, :X.Y, :latest    (releases)
#   - manual dispatch      -> tags :main and :sha-<short>
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false   # don't abort a half-finished registry push

permissions:
  contents: read
  packages: write             # required to push to GHCR with GITHUB_TOKEN

jobs:
  docker:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags/labels from the git ref. ghcr.io/<owner>/<repo>,
      # lowercased automatically by this action.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
