    <meta name="color-scheme" content="light dark" />
    <title>OCTOVOX — Voice Cleanup Console</title>
    <!-- pre-paint theme (no flash): set data-theme before any CSS loads.
         Shares the 'octovox-theme' key with the /acoustics sub-app. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem('octovox-theme') || 'system';
          var d = matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', p === 'system' ? (d ? 'dark' : 'light') : p);
        } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
      })();
    </script>
